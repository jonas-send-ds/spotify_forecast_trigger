name: Deploy Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: actions-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies and create deployment package
        run: |
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.14 \
            --only-binary=:all: \
            -r ./requirements.txt \
            -t ./lambda/
          cd ./lambda
          zip -r ../lambda-deployment.zip .
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Lambda Function
        run: |
          aws s3 cp lambda-deployment.zip s3://spotify-forecast/lambda-deployment.zip
          aws lambda update-function-code \
            --function-name spotify-forecast-lambda-function \
            --s3-bucket spotify-forecast \
            --s3-key lambda-deployment.zip
